<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compound Calc Feature Graphic Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Matches brand blue from MARKETING_DASHBOARD.html */
            --bg-gradient: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            --text-color: #ffffff;
            --font-family: 'Outfit', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1024px;
            height: 500px;
            overflow: hidden;
            font-family: var(--font-family);
            background: #f0f0f0;
        }

        /* 1024x500 Fixed Canvas for Google Play */
        .canvas {
            width: 1024px;
            height: 500px;
            background: var(--bg-gradient);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 80px;
            box-sizing: border-box;
            overflow: hidden;
            /* To make it look like a standalone image in browser */
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
        }

        /* Left: Logo and Text */
        .content-left {
            z-index: 2;
            max-width: 600px;
        }

        .app-icon {
            width: 110px;
            height: 110px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 24px;
        }

        .title {
            color: var(--text-color);
            font-size: 56px;
            font-weight: 700;
            margin: 0;
            line-height: 1.15;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            /* html2canvas bug workaround: preserve spaces explicitly */
            white-space: pre-wrap;
            letter-spacing: normal;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 28px;
            font-weight: 400;
            margin-top: 16px;
            /* html2canvas bug workaround: maintain spacing without letter-spacing overlap */
            white-space: pre-wrap;
            letter-spacing: normal;
        }

        /* Right: Floating Device Mockup */
        .device-container {
            position: absolute;
            right: 0px;
            bottom: -60px;
            transform: rotate(-12deg);
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .device-frame {
            background: #ffffff;
            border-radius: 45px;
            padding: 12px;
            box-shadow: -20px 20px 60px rgba(0,0,0,0.4);
            width: 320px;
        }

        .screenshot {
            width: 100%;
            border-radius: 35px;
            display: block;
        }

        /* Decorative element */
        .circle-deco {
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        /* Safe Zone Overlay (Optional for checking) */
        .safe-zone {
            position: absolute;
            top: 50px; /* 10% of height */
            left: 102px; /* 10% of width */
            right: 102px;
            bottom: 50px;
            border: 2px dashed rgba(255,255,255,0.15);
            pointer-events: none;
            display: none; /* Toggle to 'block' to see */
        }

        .instructions {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 1024px;
            text-align: center;
            font-size: 14px;
            color: #666;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="circle-deco"></div>

        <div class="content-left">
            <!-- Use the high-res icon -->
            <img class="app-icon" src="" alt="App Icon">
            <h1 class="title">Compound Interest Calculator</h1>
            <p class="subtitle">Visualize the Magic of Compounding</p>
        </div>

        <div class="device-container">
            <div class="device-frame">
                <!-- Using one of your best screenshots -->
                <img class="screenshot" src="" alt="Screenshot">
            </div>
        </div>

        <div class="safe-zone"></div>
    </div>

    <div class="instructions">
        Capture this area at 1024x500 using your browser's developer tools (F12).
    </div>


    <script>
        async function updateLayout() {
            const params = new URLSearchParams(window.location.search);
            const titleText = params.get('title') || 'App Title';
            const subtitleText = params.get('subtitle') || 'App Subtitle';
            const imgSrc = params.get('img') || '';
            const iconSrc = params.get('icon') || '';
            const langCode = params.get('lang') || 'ko';

            document.documentElement.lang = langCode;
            
            // Shrink to fit logic for title and subtitle
            function shrinkToFit(element, maxWidth, minSize) {
                let fontSize = parseInt(window.getComputedStyle(element).fontSize);
                while (element.scrollWidth > maxWidth && fontSize > minSize) {
                    fontSize -= 1;
                    element.style.fontSize = fontSize + 'px';
                }
            }

            const titleEl = document.querySelector('.title');
            const subtitleEl = document.querySelector('.subtitle');
            
            titleEl.innerText = titleText;
            subtitleEl.innerText = subtitleText;
            
            const ssEl = document.querySelector('.screenshot');
            if (imgSrc) {
                ssEl.onerror = function() {
                    const currentSrc = this.src;
                    if (currentSrc.includes('_en_')) return;
                    const fallbackSrc = currentSrc.replace(/_([a-z]{2})_(\d{2})_/, '_en_$2_');
                    console.log(`Image not found: ${currentSrc}. Falling back to: ${fallbackSrc}`);
                    this.src = fallbackSrc;
                };
                ssEl.src = imgSrc;
            }
            if (iconSrc) document.querySelector('.app-icon').src = iconSrc;

            // Wait for rendering and then adjust
            setTimeout(() => {
                shrinkToFit(titleEl, 600, 24); // Title max width 600px, min font size 24px
                shrinkToFit(subtitleEl, 600, 16); // Subtitle max width 600px, min font size 16px
            }, 50);

            // Wait for Google Fonts to be fully loaded so html2canvas renders them properly
            await document.fonts.ready;
        }
        window.onload = updateLayout;
    </script>
</body>
</html>
